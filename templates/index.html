<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>약물 정보 챗봇 (e약은요 · DUR)</title>
<style>
  :root {
    --bg: #f4f6f8;
    --bubble-user: #2563eb;
    --bubble-bot: #ffffff;
    --border: #e2e5ea;
    --danger: #dc2626;
    --safe: #16a34a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  header {
    padding: 14px 18px;
    background: #111827;
    color: white;
  }
  header h1 { font-size: 16px; margin: 0 0 4px; }
  header p { font-size: 12px; margin: 0; color: #9ca3af; }

  #modes {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    background: white;
    border-bottom: 1px solid var(--border);
  }
  .mode-btn {
    flex: 1;
    padding: 8px 6px;
    font-size: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #f9fafb;
    cursor: pointer;
  }
  .mode-btn.active {
    background: var(--bubble-user);
    color: white;
    border-color: var(--bubble-user);
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--bubble-user); color: white; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--bubble-bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.bot.warning { border-color: var(--danger); background: #fef2f2; }
  .msg.bot.safe { border-color: var(--safe); background: #f0fdf4; }
  .msg .tag { display:inline-block; font-size:11px; font-weight:600; padding:2px 8px; border-radius:999px; margin-bottom:6px; }
  .tag.warning { background: var(--danger); color:white; }
  .tag.safe { background: var(--safe); color:white; }

  #inputbar {
    display: flex;
    gap: 8px;
    padding: 12px;
    background: white;
    border-top: 1px solid var(--border);
  }
  #inputbar input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 14px;
  }
  #inputbar button {
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    background: var(--bubble-user);
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  #hint { font-size: 11px; color: #6b7280; padding: 0 12px 8px; background: white; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>💊 약물 정보 챗봇</h1>
    <p>e약은요 · DUR(의약품안전사용서비스) 공공데이터 기반</p>
  </header>

  <div id="modes">
    <button class="mode-btn active" data-mode="info">약 정보 조회</button>
    <button class="mode-btn" data-mode="interaction">상호작용/부작용 체크</button>
    <button class="mode-btn" data-mode="dosage">복용법 적합 체크</button>
  </div>
  <div id="hint">약 정보 조회: 제품명 입력 (예: 타이레놀정500밀리그램)</div>

  <div id="chat"></div>

  <div id="inputbar">
    <input id="textInput" type="text" placeholder="제품명을 입력하세요 (예: 타이레놀정500밀리그램)">
    <button id="sendBtn">전송</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const hint = document.getElementById('hint');
const modeBtns = document.querySelectorAll('.mode-btn');

let currentMode = 'info';

const hints = {
  info: '제품명을 입력하세요 (예: 타이레놀정500밀리그램)',
  interaction: '약물 이름을 쉼표(,)로 구분해서 2개 이상 입력하세요 (예: 타이레놀정500밀리그램, 아스피린장용정100밀리그램)',
  dosage: '약물명, 하루 횟수, 총 일수를 입력하세요 (예: 타이레놀정500밀리그램 / 하루 3번 / 5일)',
};

modeBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    modeBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    hint.textContent = hints[currentMode];
    input.placeholder = hints[currentMode];
  });
});

function addMessage(text, who, tone) {
  const div = document.createElement('div');
  div.className = 'msg ' + who + (tone ? ' ' + tone : '');
  if (tone === 'warning') {
    div.innerHTML = '<span class="tag warning">⚠ 주의</span><br>' + escapeHtml(text);
  } else if (tone === 'safe') {
    div.innerHTML = '<span class="tag safe">확인됨</span><br>' + escapeHtml(text);
  } else {
    div.textContent = text;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

async function handleSend() {
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  input.value = '';

  if (currentMode === 'info') {
    await handleInfo(text);
  } else if (currentMode === 'interaction') {
    await handleInteraction(text);
  } else if (currentMode === 'dosage') {
    await handleDosage(text);
  }
}

sendBtn.addEventListener('click', handleSend);
input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

// ---------------- 1) 약 정보 조회 ----------------
async function handleInfo(query) {
  addMessage('조회 중...', 'bot');
  try {
    const res = await fetch('/api/drug-info?q=' + encodeURIComponent(query));
    const data = await res.json();
    chat.lastChild.remove();

    if (!data.results || data.results.length === 0) {
      addMessage(`'${query}'에 대한 정보를 찾지 못했어요. 정확한 제품명(예: 타이레놀정500밀리그램)으로 다시 시도해보세요.`, 'bot');
      return;
    }
    data.results.slice(0, 3).forEach(item => {
      const lines = [
        `📌 ${item.itemName} (${item.entpName || '-'})`,
        item.efficacy ? `\n[효능] ${item.efficacy}` : '',
        item.usage ? `\n[사용법] ${item.usage}` : '',
        item.caution ? `\n[주의사항] ${item.caution}` : '',
        item.interaction ? `\n[상호작용] ${item.interaction}` : '',
        item.sideEffect ? `\n[부작용] ${item.sideEffect}` : '',
        item.storage ? `\n[보관법] ${item.storage}` : '',
      ].filter(Boolean).join('');
      addMessage(lines, 'bot');
    });
  } catch (e) {
    chat.lastChild.remove();
    addMessage('오류가 발생했어요: ' + e.message, 'bot');
  }
}

// ---------------- 2) 상호작용/부작용 체크 ----------------
async function handleInteraction(text) {
  const drugs = text.split(/[,，]/).map(s => s.trim()).filter(Boolean);
  if (drugs.length < 2) {
    addMessage('약물을 쉼표(,)로 구분해서 2개 이상 입력해주세요.', 'bot');
    return;
  }
  addMessage('상호작용 확인 중...', 'bot');
  try {
    const res = await fetch('/api/interaction-check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ drugs }),
    });
    const data = await res.json();
    chat.lastChild.remove();

    if (data.error) {
      addMessage(data.error, 'bot');
      return;
    }
    if (data.hasWarning) {
      data.warnings.forEach(w => {
        addMessage(`병용금기 가능성: ${w.drugA} + ${w.drugB}\n(DUR 데이터 근거: ${JSON.stringify(w.detail)})`, 'bot', 'warning');
      });
    } else {
      addMessage(`입력하신 ${drugs.length}개 약물 사이에서 DUR 병용금기 데이터는 발견되지 않았어요.\n(단, DUR에 등록되지 않은 상호작용까지 배제하는 것은 아니니 참고용으로만 봐주세요.)`, 'bot', 'safe');
    }
    if (data.errors && data.errors.length) {
      addMessage('일부 조회 실패: ' + data.errors.join(' / '), 'bot');
    }
  } catch (e) {
    chat.lastChild.remove();
    addMessage('오류가 발생했어요: ' + e.message, 'bot');
  }
}

// ---------------- 3) 복용법 적합 체크 ----------------
async function handleDosage(text) {
  // 아주 단순한 규칙기반 파싱: "약이름 ... 하루 N번 ... N일"
  const freqMatch = text.match(/하루\s*(\d+)\s*번/) || text.match(/1일\s*(\d+)\s*회/);
  const daysMatch = text.match(/(\d+)\s*일/g);
  const freqPerDay = freqMatch ? parseInt(freqMatch[1], 10) : null;
  // daysMatch 배열에 "하루"의 "1일"이 잡힐 수 있어 가장 마지막 숫자를 총 일수로 사용
  let totalDays = null;
  if (daysMatch && daysMatch.length) {
    const nums = daysMatch.map(s => parseInt(s, 10));
    totalDays = nums[nums.length - 1];
  }
  const drugName = text
    .replace(/하루\s*\d+\s*번/, '')
    .replace(/\d+\s*일/g, '')
    .replace(/[\/,，]/g, ' ')
    .trim();

  if (!drugName) {
    addMessage('약물명을 인식하지 못했어요. 예) 타이레놀정500밀리그램 하루 3번 5일', 'bot');
    return;
  }

  addMessage('복용법 확인 중...', 'bot');
  try {
    const res = await fetch('/api/dosage-check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ drug: drugName, freqPerDay, days: totalDays }),
    });
    const data = await res.json();
    chat.lastChild.remove();

    if (data.error) {
      addMessage(data.error, 'bot');
      return;
    }

    let summary = `${data.drug} — 입력값: 하루 ${data.inputFreqPerDay ?? '?'}회, 총 ${data.inputDays ?? '?'}일\n\n`;
    if (data.periodCaution && data.periodCaution.length) {
      summary += '[투여기간주의 관련 데이터]\n' + data.periodCaution.map(p => '- ' + (p.note || '(문구 없음)')).join('\n') + '\n\n';
    }
    if (data.capacityCaution && data.capacityCaution.length) {
      summary += '[용량주의 관련 데이터]\n' + data.capacityCaution.map(p => '- ' + (p.note || '(문구 없음)')).join('\n') + '\n\n';
    }
    summary += data.note;

    addMessage(summary, 'bot', data.hasCaution ? 'warning' : 'safe');
  } catch (e) {
    chat.lastChild.remove();
    addMessage('오류가 발생했어요: ' + e.message, 'bot');
  }
}

addMessage('안녕하세요! 위 탭에서 원하는 기능을 선택하고 메시지를 입력해 주세요.', 'bot');
</script>
</body>
</html>
